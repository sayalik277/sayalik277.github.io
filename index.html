    <!-- Restore path encoded by 404.html for SPA routing on GitHub Pages -->
    <script>
      (function() {
        var qs = window.location.search;
        if (qs.indexOf('?p=') === 0 || qs.indexOf('&p=') !== -1) {
          var params = qs.slice(1).split('&').reduce(function(p, s) {
            var r = s.split('=');
            p[decodeURIComponent(r[0])] = decodeURIComponent(r.slice(1).join('=').replace(/~and~/g, '&'));
            return p;
          }, {});
          if (params.p !== undefined) {
            window.history.replaceState(null, null,
              params.p + (params.q ? '?' + params.q : '') + (window.location.hash || '')
            );
          }
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
